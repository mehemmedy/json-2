<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="src/output.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <title>Document</title>
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
</head>

<body>
    <div class="container">
        <div class="p-4 mx-auto max-w-xl bg-white">
            <h2 class="text-3xl text-slate-900 font-bold">Elave Et</h2>
            <form class="mt-8 space-y-5">
                <div>
                    <label class='text-sm text-slate-900 font-medium mb-2 block'>Name</label>
                    <input type='text' id="title" placeholder='Enter Name'
                        class="w-full py-2.5 px-4 text-slate-800 bg-gray-100 border border-gray-200 focus:border-slate-900 focus:bg-transparent text-sm outline-0 transition-all" />
                </div>
                <div>
                    <label class='text-sm text-slate-900 font-medium mb-2 block'>Price</label>
                    <input type='number' id="price" placeholder='Enter Price'
                        class="w-full py-2.5 px-4 text-slate-800 bg-gray-100 border border-gray-200 focus:border-slate-900 focus:bg-transparent text-sm outline-0 transition-all" />
                </div>
                <div>
                    <label class='text-sm text-slate-900 font-medium mb-2 block'>Description</label>
                    <input type='text' id="desc" placeholder='Enter Description'
                        class="w-full py-2.5 px-4 text-slate-800 bg-gray-100 border border-gray-200 focus:border-slate-900 focus:bg-transparent text-sm outline-0 transition-all" />
                </div>
                <div>
                    <label class='text-sm text-slate-900 font-medium mb-2 block'>Category</label>
                    <input placeholder='Enter Category' id="category" rows="6"
                        class="w-full py-2.5 px-4 text-slate-800 bg-gray-100 border border-gray-200 focus:border-slate-900 focus:bg-transparent text-sm outline-0 transition-all" />
                </div>
                <div>
                    <label class='text-sm text-slate-900 font-medium mb-2 block'>Image</label>
                    <input placeholder='Enter Image' id="img" rows="6"
                        class="w-full py-2.5 px-4 text-slate-800 bg-gray-100 border border-gray-200 focus:border-slate-900 focus:bg-transparent text-sm outline-0 transition-all" />
                </div>

                <button type='button' onclick="elaveET()"
                    class="text-white bg-slate-900 font-medium hover:bg-slate-800 tracking-wide text-sm px-4 py-2.5 w-full border-0 outline-0 cursor-pointer">Elave et</button>
                <button type='button' onclick="bagla()"
                    class="text-white bg-slate-900 font-medium hover:bg-slate-800 tracking-wide text-sm px-4 py-2.5 w-full border-0 outline-0 cursor-pointer">Geri Qayit</button>
            </form>
        </div>
    </div>
    <script src="App.js"></script>
    <script src="Add.js"></script>
</body>

</html>
